<!DOCTYPE html>
<html lang="en">
<head>
    <title>Mindful Redirect Options</title>
    <link rel="stylesheet" href="./popup.css">
</head>
<body>
    <main class="container">
        <h1>Options</h1>

        <label for="blockedWebsites">Blocked websites, one per line</label>
        <textarea id="blockedWebsites"></textarea>

        <label for="timer">Reflection timer duration</label>
        <select id="timer">
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="60">1 min</option>
            <option value="120">2 min</option>
            <option value="300">5 min</option>
            <option value="600">10 min</option>
        </select>

        <label for="routine">Routine message</label>
        <input type="text" id="routine">

        <label for="timeout">Unblock expiration duration</label>
        <select id="timeout">
            <option value="60">1 min</option>
            <option value="300">5 min</option>
            <option value="600">10 min</option>
            <option value="1800">30 min</option>
            <option value="3600">1 hr</option>
            <option value="10800">3 hr</option>
        </select>

        <div id="status"></div>
        <button id="save">Save</button>

        <section class="whitelist-section">
            <h2>Recently unblocked</h2>
            <ul id="whitelist"></ul>
        </section>
    </main>

    <script src="popup.js"></script>
</body>
</html>
