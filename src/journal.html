<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal</title>
    <link rel="stylesheet" href="journalStyles.css">
</head>
<body>
    <main class="container">
        <p class="eyebrow">Journal</p>
        <h1>Why are you opening this?</h1>
        <p class="subtitle">One sentence is fine. No word limit.</p>

        <form id="journalForm">
            <label for="journalEntry">Reflection</label>
            <textarea id="journalEntry" name="journalEntry" placeholder="I want to open this because..."></textarea>
            <button type="submit" class="primary-button">Submit reflection</button>
        </form>

        <div class="export-buttons">
            <button type="ECSV" class="secondary-button">Export CSV</button>
            <button type="ETXT" class="secondary-button">Export TXT</button>
        </div>
    </main>

    <script src="journal.js"></script>
</body>
</html>
