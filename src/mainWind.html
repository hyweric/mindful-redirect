<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindful Redirect</title>
    <link rel="stylesheet" href="./mainWind.css">
</head>
<body>
    <main class="container">
        <p class="eyebrow">Mindful Redirect</p>
        <h1>Pause before continuing</h1>
        <p class="subtitle">Choose a quick reflection before opening this site.</p>

        <section class="button-grid">
            <button id="journalButton" class="choice-card">
                <svg viewBox="0 0 448 512" aria-hidden="true">
                    <path d="M0 96C0 43 43 0 96 0h96v190.7c0 13.4 15.5 20.9 26 12.5L272 160l54 43.2c10.5 8.4 26 .9 26-12.5V0h64c17.7 0 32 14.3 32 32v320c0 17.7-14.3 32-32 32v64c17.7 0 32 14.3 32 32s-14.3 32-32 32H96c-53 0-96-43-96-96V96zm64 320c0 17.7 14.3 32 32 32h256v-64H96c-17.7 0-32 14.3-32 32z"/>
                </svg>
                <span>Journal</span>
                <small>Write one quick thought.</small>
            </button>

            <button id="routineButton" class="choice-card">
                <svg viewBox="0 0 576 512" aria-hidden="true">
                    <path d="M272 416c17.7 0 32-14.3 32-32s-14.3-32-32-32H160c-17.7 0-32-14.3-32-32V192h32c12.9 0 24.6-7.8 29.6-19.8s2.2-25.7-6.9-34.9l-64-64c-12.5-12.5-32.8-12.5-45.3 0l-64 64c-9.2 9.2-11.9 22.9-6.9 34.9S19.1 192 32 192h32v128c0 53 43 96 96 96h112zm32-320c-17.7 0-32 14.3-32 32s14.3 32 32 32h112c17.7 0 32 14.3 32 32v128h-32c-12.9 0-24.6 7.8-29.6 19.8s-2.2 25.7 6.9 34.9l64 64c12.5 12.5 32.8 12.5 45.3 0l64-64c9.2-9.2 11.9-22.9 6.9-34.9S556.9 320 544 320h-32V192c0-53-43-96-96-96H304z"/>
                </svg>
                <span>Routine</span>
                <small>Read a short reset flow.</small>
            </button>

            <button id="reflectionTimerButton" class="choice-card">
                <svg viewBox="0 0 512 512" aria-hidden="true">
                    <path d="M256 0a256 256 0 1 0 0 512A256 256 0 1 0 256 0zm24 128v112l80 48c11.4 6.9 15.1 21.7 8.2 33.1s-21.7 15.1-33.1 8.2l-92-55.2c-7.2-4.3-11.6-12.1-11.6-20.6V128c0-13.3 10.7-24 24-24s24.5 10.7 24.5 24z"/>
                </svg>
                <span>Timer</span>
                <small>Wait it out, one tick at a time.</small>
            </button>
        </section>

        <button id="exitAndFocusButton" class="exit-button">Exit and focus</button>
    </main>

    <script src="./mainWind.js" type="module"></script>
</body>
</html>
